spring:
  application:
    name: Backend
  datasource:
    # TODO: MySQL 서버/DB 생성 후 실제 접속 정보로 교체하거나 환경변수로 주입한다.
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/backend?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME:TODO}
    password: ${MYSQL_PASSWORD:TODO}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
