name: CD

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build application JAR
        run: ./gradlew --no-daemon bootJar -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/prography-samsumg/Backend:latest
            ghcr.io/prography-samsumg/Backend:${{ github.sha }}

      - name: Deploy to EC2 via SSM
        env:
          IMAGE_NAME: ghcr.io/prography-samsumg/Backend
          IMAGE_TAG: ${{ github.sha }}
          SPRING_PROFILES_ACTIVE: prod
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          set -euo pipefail

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Prography" \
            --parameters commands="[
              \"IMAGE_NAME=$IMAGE_NAME IMAGE_TAG=$IMAGE_TAG ENV_FILE=/home/ubuntu/prography/.env SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE GHCR_USERNAME=$GHCR_USERNAME GHCR_TOKEN=$GHCR_TOKEN HEALTHCHECK_URL=http://localhost:8080/api/fermata/health /home/ubuntu/prography/scripts/deploy.sh\"
            ]" \
            --query "Command.CommandId" --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> "$GITHUB_ENV"

          echo "Waiting for deployment to complete (up to 10 minutes)..."
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "[$i/60] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded."
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi

            if [ "$i" -eq 60 ]; then
              echo "Timed out waiting for deployment."
              exit 1
            fi

            sleep 10
          done

      - name: Fetch SSM output
        if: always() && env.COMMAND_ID != ''
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          COMMAND_ID: ${{ env.COMMAND_ID }}
        run: |
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --output text
